name: CI

on:
    push:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        steps: 
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                node-version: 24
                cache: 'npm'
            - run: npm ci
            - run: npm run build
            - uses: actions/configure-pages@v6
            - uses: actions/upload-pages-artifact@v5
              with:
                path: "./dist"
    deploy:
        needs: build
        permissions:
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{steps.deployment.outputs.page_url}}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/deploy-pages@v5
              id: deployment